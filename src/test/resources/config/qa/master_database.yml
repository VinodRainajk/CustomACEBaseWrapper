# config/qa/ - mvn test -Dprofile=qa

mysql:
  type: mysql
  url: jdbc:mysql://qa-host:3306/testdb
  username: qa_user
  password: qa_pass
  driver: com.mysql.cj.jdbc.Driver
  timeout: 30000

mysql-world:
  type: mysql
  url: jdbc:mysql://qa-host:3306/world
  username: qa_user
  password: qa_pass
  driver: com.mysql.cj.jdbc.Driver
  timeout: 30000

postgresql:
  type: postgresql
  url: jdbc:postgresql://qa-host:5432/testdb
  username: qa_user
  password: qa_pass
  driver: org.postgresql.Driver
  timeout: 30000

oracle:
  type: oracle
  url: jdbc:oracle:thin:@qa-host:1521:xe
  username: qa_user
  password: qa_pass
  driver: oracle.jdbc.OracleDriver
  timeout: 30000
